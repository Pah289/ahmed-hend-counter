<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>رسالة اليوم</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Tahoma,Arial,sans-serif;
    text-align:center;
    background:white;
}

.title{
    font-size:28px;
    color:#7b1fa2;
    margin-bottom:20px;
    font-weight:bold;
}

.message{
    font-size:22px;
    line-height:2;
    color:#333;
}

</style>

</head>

<body>

<div class="title">
💌 رسالة اليوم
</div>

<div id="message" class="message">
جاري تحميل الرسالة...
</div>

<script>

const relationshipStart =
new Date(2026,2,22);

fetch('messages.json')
.then(response => response.json())
.then(messages => {

    const today = new Date();

    const diffDays = Math.floor(
        (today - relationshipStart)
        /
        (1000 * 60 * 60 * 24)
    );

    const index =
    Math.abs(diffDays) % messages.length;

    document.getElementById("message")
    .innerHTML =
    messages[index];

});

</script>

</body>
</html>
